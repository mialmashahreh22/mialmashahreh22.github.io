  </g>
  <text x="420" y="178" fill="url(#text)" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="4">MOSEC</text>
  <text x="424" y="238" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Bug Bounty • SOC • Cloud Security</text>
