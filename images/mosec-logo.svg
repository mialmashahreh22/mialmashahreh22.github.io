<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">MOSEC Cybersecurity Logo</title>
  <desc id="desc">A cyan and green cybersecurity shield logo with connected nodes and the text MOSEC.</desc>
  <defs>
    <linearGradient id="shield" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="54%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="text" x1="0" x2="1">
